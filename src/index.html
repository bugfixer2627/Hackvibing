<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>任意门食盒 · The Passport Pantry</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #FDF6EC;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    }
    canvas#gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #error-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(253, 246, 236, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
      text-align: center;
    }
    #error-overlay.visible { display: flex; }
    #error-overlay p {
      font-size: 18px;
      color: #333;
      margin-bottom: 24px;
      line-height: 1.5;
    }
    #error-overlay button {
      padding: 12px 32px;
      font-size: 16px;
      background: #E07A5F;
      color: #fff;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-family: inherit;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="error-overlay">
    <p>哎呀，出错了，请重启试试吧~</p>
    <button onclick="window.location.reload()">重试</button>
  </div>
  <!-- BUILD_SCRIPTS_HERE -->
</body>
</html>
